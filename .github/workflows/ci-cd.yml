---
name: CI-CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets in code (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan dependencies for vulnerabilities
        working-directory: services/user-auth
        run: npm audit --audit-level=high

  build-and-push:
    needs: security-scan
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend image (local, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: services/frontend
          push: false
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lab-frontend:${{ github.sha }}

      - name: Scan frontend image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/lab-frontend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: services/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-frontend:latest

      - name: Build auth image (local, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: services/user-auth
          push: false
          load: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lab-auth:${{ github.sha }}

      - name: Scan auth image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/lab-auth:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Push auth image
        uses: docker/build-push-action@v6
        with:
          context: services/user-auth
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-auth:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-auth:latest

      - name: Install kustomize
        run: |
          curl -Lo /tmp/kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
          tar -xzf /tmp/kustomize.tar.gz -C /tmp/
          sudo mv /tmp/kustomize /usr/local/bin/kustomize

      - name: Update image tags in k8s manifests
        run: |
          cd infrastructure/k8s/overlays/production
          kustomize edit set image \
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-frontend=${{ secrets.DOCKERHUB_USERNAME }}/lab-frontend:${{ github.sha }}
          kustomize edit set image \
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-auth=${{ secrets.DOCKERHUB_USERNAME }}/lab-auth:${{ github.sha }}

          cd ../development
          kustomize edit set image \
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-frontend=${{ secrets.DOCKERHUB_USERNAME }}/lab-frontend:${{ github.sha }}
          kustomize edit set image \
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-auth=${{ secrets.DOCKERHUB_USERNAME }}/lab-auth:${{ github.sha }}

      - name: Commit and push manifest updates
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add infrastructure/k8s/overlays/
          git diff --cached --quiet || \
            git commit -m "ci: deploy ${{ github.sha }}"
          git push

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure namespace and secrets exist
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          kubectl create secret docker-registry dockerhub-creds \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username="${DOCKERHUB_USERNAME}" \
            --docker-password="${DOCKERHUB_TOKEN}" \
            --namespace=auraweb-prod \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

          kubectl create secret generic app-secrets \
            --from-literal=DB_NAME="${DB_NAME:-auraweb_db}" \
            --from-literal=DB_USER="${DB_USER:-auraweb_user}" \
            --from-literal=DB_PASSWORD="${DB_PASSWORD:-devpassword}" \
            --namespace=auraweb-prod \
            --dry-run=client -o yaml | kubectl apply --validate=false -f -

      - name: Apply k8s manifests
        run: |
          kubectl apply --validate=false -k infrastructure/k8s/overlays/production/
          kubectl apply --validate=false -f k8s/monitoring/

      - name: Update image tags in deployments
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          kubectl set image deployment/frontend \
            frontend=${DOCKERHUB_USERNAME}/lab-frontend:${{ github.sha }} \
            -n auraweb-prod
          kubectl set image deployment/user-auth \
            user-auth=${DOCKERHUB_USERNAME}/lab-auth:${{ github.sha }} \
            -n auraweb-prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/frontend -n auraweb-prod --timeout=120s
          kubectl rollout status deployment/user-auth -n auraweb-prod --timeout=120s
