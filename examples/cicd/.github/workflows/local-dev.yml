name: Local Development CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [feature/**, bugfix/**]

jobs:
  # ==========================================
  # Local Build and Test
  # ==========================================
  local-build:
    name: Local Docker Compose Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker Compose
        run: |
          docker compose build

      - name: Start services
        run: |
          docker compose up -d
          sleep 10

      - name: Run health checks
        run: |
          # Check backend health
          curl -f http://localhost:3000/health || exit 1
          
          # Check frontend
          curl -f http://localhost || exit 1
          
          # Check admin
          curl -f http://localhost/admin || exit 1

      - name: Run backend tests in container
        run: |
          docker compose exec -T backend npm test

      - name: View logs on failure
        if: failure()
        run: |
          docker compose logs

      - name: Stop services
        if: always()
        run: |
          docker compose down -v

  # ==========================================
  # Local Linting
  # ==========================================
  local-lint:
    name: Local Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Lint Backend
        run: |
          cd backend
          npm ci
          npm run lint

      - name: Lint Frontend
        run: |
          cd frontend
          npm ci
          npm run lint

      - name: Lint Admin
        run: |
          cd admin
          npm ci
          npm run lint
