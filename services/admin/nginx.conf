server {
    listen 80;
    
    # Limit request body size to prevent large upload attacks
    client_max_body_size 10M;

    # ==========================================
    # Gzip Compression
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    # ==========================================
    # Security Headers
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    # CSP: Stricter policy - removed unsafe-eval for better security
    # Note: If build-time issues occur, consider using nonces instead of unsafe-inline
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self';";
    
    # ==========================================
    # Root Path Handler (for health checks)
    # ==========================================
    # Health checks hit the root path, so we serve index.html there too
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    
    # ==========================================
    # Static Assets Caching (MUST come before /admin location)
    # ==========================================
    # Handle static assets under /admin/assets/ path
    # Using ^~ to give this higher priority than the /admin location
    location ^~ /admin/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================
    # Main Application Handling (/admin)
    # ==========================================
    # Because this app is proxied under /admin, we use 'alias' to map the 
    # URL path to the filesystem root.
    location /admin {
        alias /usr/share/nginx/html/;
        index index.html index.htm;
        
        # SPA Routing: Only try as file or fallback to index.html
        # Removed $uri/ to prevent treating files as directories
        try_files $uri /admin/index.html;
        
        # HTML Caching: Never cache index.html to ensure updates are immediate
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    
    # Fallback for any other static assets at root level (for health check page)
    location ~* \.(css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
