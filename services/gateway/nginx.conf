events {
    # The maximum number of simultaneous connections that can be opened by a worker process.
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Global performance tweaks
    sendfile        on;
    keepalive_timeout  65;
    
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    
    # Request size limit
    client_max_body_size 10M;

    # ==========================================
    # Global Security Headers
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN";           # Prevent Clickjacking
    add_header X-XSS-Protection "1; mode=block";       # Enable XSS filtering
    add_header X-Content-Type-Options "nosniff";       # Prevent MIME type sniffing
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";  # Restrict browser features

    # ==========================================
    # Frontend Applications
    # ==========================================
    upstream frontend {
        server frontend:80;
    }

    upstream admin {
        server admin:80;
    }

    # ==========================================
    # Backend Microservices (Consolidated)
    # ==========================================
    
    # Catalog Service: Products, Reviews, Search, Recommendations
    upstream catalog-service {
        server catalog:3001;
    }

    # User & Communication Service: Auth, Users, Notifications
    upstream user-communication-service {
        server user-auth:3000;
    }

    # Order & Payment Service: Orders, Payments
    upstream order-payment-service {
        server order-payment:3002;
    }

    # Fulfillment Service: Shipping, Coupons
    upstream fulfillment-service {
        server fulfillment:3003;
    }

    # Shopping Service: Cart, Wishlist
    upstream shopping-service {
        server shopping:3004;
    }

    # Platform & Insights Service: Analytics, Files, Reports, Audit
    upstream platform-insights-service {
        server platform:3005;
    }

    # Inventory Service: Stock Management
    upstream inventory-service {
        server inventory:3006;
    }

    server {
        listen 80;
        server_name _;

        # ==========================================
        # API Gateway Routing (Consolidated Services)
        # ==========================================
        
        # User & Communication Service Routes
        location /api/auth {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://user-communication-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/users {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://user-communication-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/notifications {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://user-communication-service;
            include /etc/nginx/proxy_params;
        }

        # Explicit Health Check for Auth Service
        location /api/auth/health {
            proxy_pass http://user-communication-service/health;
            include /etc/nginx/proxy_params;
        }
        
        # Catalog Service Routes
        location /api/products {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://catalog-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/categories {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://catalog-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/reviews {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://catalog-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/search {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://catalog-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/recommendations {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://catalog-service;
            include /etc/nginx/proxy_params;
        }
        
        # Inventory Service Routes
        location /api/inventory {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://inventory-service;
            include /etc/nginx/proxy_params;
        }
        
        # Shopping Service Routes
        location /api/cart {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://shopping-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/wishlists {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://shopping-service;
            include /etc/nginx/proxy_params;
        }
        
        # Order & Payment Service Routes
        location /api/orders {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://order-payment-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/payments {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://order-payment-service;
            include /etc/nginx/proxy_params;
        }
        
        # Fulfillment Service Routes
        location /api/shipping {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://fulfillment-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/coupons {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://fulfillment-service;
            include /etc/nginx/proxy_params;
        }
        
        # Platform & Insights Service Routes
        location /api/analytics {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://platform-insights-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/files {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://platform-insights-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/reports {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://platform-insights-service;
            include /etc/nginx/proxy_params;
        }
        
        location /api/audit {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://platform-insights-service;
            include /etc/nginx/proxy_params;
        }
        
        # Health check endpoint
        location /api/health {
            limit_req zone=api burst=100 nodelay;
            proxy_pass http://user-communication-service;
            include /etc/nginx/proxy_params;
        }

        # ==========================================
        # Frontend Proxy (Root /)
        # ==========================================
        location / {
            # Apply rate limiting
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
        }

        # ==========================================
        # Admin Proxy (Path /admin)
        # ==========================================
        # Routes requests starting with /admin to the Admin container.
        # We assume the Admin app is built with base="/admin" so it expects this path.
        location /admin {
            # Apply rate limiting
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Ensure trailing slash for directory requests to prevent redirect loops
            rewrite ^/admin$ /admin/ permanent;
        }
    }
}
