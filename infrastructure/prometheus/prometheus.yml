global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'docker-compose'
    environment: 'development'

scrape_configs:
  # Microservices scraping
  - job_name: 'microservices'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'user-communication-service:3000'
          - 'catalog-service:3001'
          - 'order-payment-service:3002'
          - 'fulfillment-service:3003'
          - 'shopping-service:3004'
          - 'platform-insights-service:3005'
          - 'inventory-service:3006'
        labels:
          group: 'backend-services'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
