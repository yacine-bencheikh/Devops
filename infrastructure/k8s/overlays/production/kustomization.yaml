apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production


images:
- name: yassine09/lab-auth
  newName: yassine09/lab-auth
  newTag: 96b889341a2f39f9d01fc0d1b7045cc65161ec65
- name: yassine09/lab-frontend
  newName: yassine09/lab-frontend
  newTag: 96b889341a2f39f9d01fc0d1b7045cc65161ec65

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
