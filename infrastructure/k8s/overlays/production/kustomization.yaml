apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production

images:
- name: frontend
  newName: yassine09/lab-frontend
  newTag: b00641865075d77d99a4c265fb0f87f2dc91da26
- name: user-auth
  newName: yassine09/lab-auth
  newTag: b00641865075d77d99a4c265fb0f87f2dc91da26

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
