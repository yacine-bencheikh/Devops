apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production

images:
- name: frontend
  newName: yassine09/lab-frontend
  newTag: e08a1662be18b92d41335424c7ddb59054376119
- name: user-auth
  newName: yassine09/lab-auth
  newTag: e08a1662be18b92d41335424c7ddb59054376119

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
