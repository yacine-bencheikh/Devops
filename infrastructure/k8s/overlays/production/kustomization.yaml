apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production


images:
- name: yassine09/lab-auth
  newName: yassine09/lab-auth
  newTag: 74b5ddb8da42537644cd640a3a4efddb9e9c46e9
- name: yassine09/lab-frontend
  newName: yassine09/lab-frontend
  newTag: 74b5ddb8da42537644cd640a3a4efddb9e9c46e9

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
