apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production

images:
- name: frontend
  newName: yassine09/lab-frontend
  newTag: 3bf6012529ae20dc05a2cc58b9f4eb52ec29921f
- name: user-auth
  newName: yassine09/lab-auth
  newTag: 3bf6012529ae20dc05a2cc58b9f4eb52ec29921f

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
