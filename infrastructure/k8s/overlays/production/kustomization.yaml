apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production

images:
  - name: frontend
    newName: yassine09/lab-frontend
    newTag: latest
  - name: user-auth
    newName: yassine09/lab-auth
    newTag: latest

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LOG_LEVEL
          value: info
