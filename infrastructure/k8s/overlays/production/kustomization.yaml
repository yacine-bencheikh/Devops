apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production


images:
- name: yassine09/lab-auth
  newName: yassine09/lab-auth
  newTag: c9dcd9b38e447521f5e204ce8bab3ae082ca9da3
- name: yassine09/lab-frontend
  newName: yassine09/lab-frontend
  newTag: c9dcd9b38e447521f5e204ce8bab3ae082ca9da3

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
