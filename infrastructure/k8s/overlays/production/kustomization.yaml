apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production

images:
- name: frontend
  newName: yassine09/lab-frontend
  newTag: 88eaa32a9f28a836f41ff6da0d9e86d21b397882
- name: user-auth
  newName: yassine09/lab-auth
  newTag: 88eaa32a9f28a836f41ff6da0d9e86d21b397882

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
