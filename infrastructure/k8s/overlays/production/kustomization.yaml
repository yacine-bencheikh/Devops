apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production


images:
- name: yassine09/lab-auth
  newName: yassine09/lab-auth
  newTag: 0d8a1d8aba942fac8ba684b470c7993cf4bc81ea
- name: yassine09/lab-frontend
  newName: yassine09/lab-frontend
  newTag: 0d8a1d8aba942fac8ba684b470c7993cf4bc81ea

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
