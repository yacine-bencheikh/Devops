apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production


images:
- name: yassine09/lab-auth
  newName: yassine09/lab-auth
  newTag: a613e1f70a390db760c314b78cfd97fd0098c751
- name: yassine09/lab-frontend
  newName: yassine09/lab-frontend
  newTag: a613e1f70a390db760c314b78cfd97fd0098c751

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
