apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production


images:
- name: yassine09/lab-auth
  newName: yassine09/lab-auth
  newTag: cd9372fcebc7c32f70c5da603a689354082ae62a
- name: yassine09/lab-frontend
  newName: yassine09/lab-frontend
  newTag: cd9372fcebc7c32f70c5da603a689354082ae62a

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
