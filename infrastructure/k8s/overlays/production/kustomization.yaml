apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production


images:
- name: yassine09/lab-auth
  newName: yassine09/lab-auth
  newTag: 3ddc5fc1d0997a235d5d0352c5a39b3bee3d5811
- name: yassine09/lab-frontend
  newName: yassine09/lab-frontend
  newTag: 3ddc5fc1d0997a235d5d0352c5a39b3bee3d5811

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
