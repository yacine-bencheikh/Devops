apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production

images:
- name: frontend
  newName: yassine09/lab-frontend
  newTag: 8148f61f60a0cd8b09c03b0bbd48758a1220519a
- name: user-auth
  newName: yassine09/lab-auth
  newTag: 8148f61f60a0cd8b09c03b0bbd48758a1220519a

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
