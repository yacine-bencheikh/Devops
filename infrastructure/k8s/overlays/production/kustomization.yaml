apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production


images:
- name: yassine09/lab-auth
  newName: yassine09/lab-auth
  newTag: 3be5547e871a7bd9539364f47b2437bdbb743b19
- name: yassine09/lab-frontend
  newName: yassine09/lab-frontend
  newTag: 3be5547e871a7bd9539364f47b2437bdbb743b19

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
