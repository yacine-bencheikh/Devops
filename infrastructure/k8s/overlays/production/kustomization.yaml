apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- gateway.yaml

namespace: auraweb-prod

commonLabels:
  environment: production


images:
- name: yassine09/lab-auth
  newName: yassine09/lab-auth
  newTag: dec71523c08596a467b4c12c9acac2dd75cdafc9
- name: yassine09/lab-frontend
  newName: yassine09/lab-frontend
  newTag: dec71523c08596a467b4c12c9acac2dd75cdafc9

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
