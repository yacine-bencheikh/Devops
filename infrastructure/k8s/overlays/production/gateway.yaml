apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auraweb-ingress
  namespace: auraweb-prod
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: user-auth
            port:
              number: 3000
      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: user-auth
            port:
              number: 3000
      - path: /api/health
        pathType: Prefix
        backend:
          service:
            name: user-auth
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
