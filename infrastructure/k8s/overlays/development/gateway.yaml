apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auraweb-ingress
  namespace: auraweb-dev
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: dev-user-auth
            port:
              number: 3000
      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: dev-user-auth
            port:
              number: 3000
      - path: /api/notifications
        pathType: Prefix
        backend:
          service:
            name: dev-user-auth
            port:
              number: 3000
      - path: /api/health
        pathType: Prefix
        backend:
          service:
            name: dev-user-auth
            port:
              number: 3000
      - path: /api/products
        pathType: Prefix
        backend:
          service:
            name: dev-catalog
            port:
              number: 3001
      - path: /api/categories
        pathType: Prefix
        backend:
          service:
            name: dev-catalog
            port:
              number: 3001
      - path: /api/reviews
        pathType: Prefix
        backend:
          service:
            name: dev-catalog
            port:
              number: 3001
      - path: /api/search
        pathType: Prefix
        backend:
          service:
            name: dev-catalog
            port:
              number: 3001
      - path: /api/recommendations
        pathType: Prefix
        backend:
          service:
            name: dev-catalog
            port:
              number: 3001
      - path: /api/orders
        pathType: Prefix
        backend:
          service:
            name: dev-order-payment
            port:
              number: 3002
      - path: /api/payments
        pathType: Prefix
        backend:
          service:
            name: dev-order-payment
            port:
              number: 3002
      - path: /api/shipping
        pathType: Prefix
        backend:
          service:
            name: dev-fulfillment
            port:
              number: 3003
      - path: /api/coupons
        pathType: Prefix
        backend:
          service:
            name: dev-fulfillment
            port:
              number: 3003
      - path: /api/cart
        pathType: Prefix
        backend:
          service:
            name: dev-shopping
            port:
              number: 3004
      - path: /api/wishlist
        pathType: Prefix
        backend:
          service:
            name: dev-shopping
            port:
              number: 3004
      - path: /api/analytics
        pathType: Prefix
        backend:
          service:
            name: dev-platform
            port:
              number: 3005
      - path: /api/files
        pathType: Prefix
        backend:
          service:
            name: dev-platform
            port:
              number: 3005
      - path: /api/reports
        pathType: Prefix
        backend:
          service:
            name: dev-platform
            port:
              number: 3005
      - path: /api/audit
        pathType: Prefix
        backend:
          service:
            name: dev-platform
            port:
              number: 3005
      - path: /api/inventory
        pathType: Prefix
        backend:
          service:
            name: dev-inventory
            port:
              number: 3006
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: dev-admin
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dev-frontend
            port:
              number: 80
