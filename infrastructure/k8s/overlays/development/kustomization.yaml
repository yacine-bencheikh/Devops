apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - gateway.yaml

namespace: auraweb-dev

namePrefix: dev-

commonLabels:
  environment: development

images:
  - name: frontend
    newName: yassine09/lab-frontend
    newTag: latest
  - name: user-auth
    newName: yassine09/lab-auth
    newTag: latest
