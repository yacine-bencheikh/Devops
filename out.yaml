apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    environment: production
  name: postgres
  namespace: auraweb-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      environment: production
  serviceName: postgres
  template:
    metadata:
      labels:
        app: postgres
        environment: production
    spec:
      containers:
      - env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              key: DB_NAME
              name: app-secrets
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: DB_USER
              name: app-secrets
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: DB_PASSWORD
              name: app-secrets
        image: postgres:16-alpine
        name: postgres
        ports:
        - containerPort: 5432
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: postgres-data
  volumeClaimTemplates:
  - metadata:
      labels:
        environment: production
      name: postgres-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  labels:
    environment: production
  name: auraweb-gateway
  namespace: auraweb-prod
spec:
  gatewayClassName: eg
  listeners:
  - allowedRoutes:
      namespaces:
        from: Same
    name: http
    port: 80
    protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  labels:
    environment: production
  name: auraweb-routes
  namespace: auraweb-prod
spec:
  parentRefs:
  - name: auraweb-gateway
  rules:
  - backendRefs:
    - name: user-auth
      port: 3000
    filters:
    - responseHeaderModifier:
        add:
        - name: X-Frame-Options
          value: SAMEORIGIN
        - name: X-XSS-Protection
          value: 1; mode=block
        - name: X-Content-Type-Options
          value: nosniff
      type: ResponseHeaderModifier
    matches:
    - path:
        type: PathPrefix
        value: /api/auth
    - path:
        type: PathPrefix
        value: /api/users
    - path:
        type: PathPrefix
        value: /api/notifications
    - path:
        type: PathPrefix
        value: /api/health
  - backendRefs:
    - name: catalog
      port: 3001
    filters:
    - responseHeaderModifier:
        add:
        - name: X-Frame-Options
          value: SAMEORIGIN
        - name: X-XSS-Protection
          value: 1; mode=block
        - name: X-Content-Type-Options
          value: nosniff
      type: ResponseHeaderModifier
    matches:
    - path:
        type: PathPrefix
        value: /api/products
    - path:
        type: PathPrefix
        value: /api/categories
    - path:
        type: PathPrefix
        value: /api/reviews
    - path:
        type: PathPrefix
        value: /api/search
    - path:
        type: PathPrefix
        value: /api/recommendations
  - backendRefs:
    - name: order-payment
      port: 3002
    filters:
