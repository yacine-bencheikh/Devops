# ==========================================
# Add-on : Mini SOC avec détection d'anomalies par IA (v3 - dashboard complet)
# Dashboard accessible sur : http://<VM-IP>:8500  (login: admin / admin)
# ==========================================

services:
  ai-anomaly-detector:
    build: ./dashboard
    container_name: ai-anomaly-detector
    ports:
      - "8500:8500"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - METRICS_URL=${METRICS_URL:-http://host.docker.internal:30300/metrics}
    restart: unless-stopped

  traffic-generator:
    build: ./traffic-generator
    container_name: traffic-generator
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - USER_AUTH_URL=${USER_AUTH_URL:-http://host.docker.internal:30300}
    restart: unless-stopped

  attack-simulator:
    build: ./attack-simulator
    container_name: attack-simulator
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - USER_AUTH_URL=${USER_AUTH_URL:-http://host.docker.internal:30300}
    restart: "no"
